version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=sqlite:///./devpilot.db
      - CORS_ORIGINS=http://localhost:3000
    volumes:
      - ./backend:/app
      - ./backend/chroma_data:/app/chroma_data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - devpilot-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    depends_on:
      - backend
    networks:
      - devpilot-network

networks:
  devpilot-network:
    driver: bridge

